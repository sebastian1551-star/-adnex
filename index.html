<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiszki - Mały Zakład Mechaniczny</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --bg-color: #ecf0f1;
            --card-front-bg: #ffffff;
            --card-back-bg: #34495e;
            --text-front: #2c3e50;
            --text-back: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            border-bottom: 3px solid var(--accent-color);
            padding-bottom: 10px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
            max-width: 1200px;
        }

        /* Styl kontenera fiszki (perspektywa 3D) */
        .flashcard-wrapper {
            background-color: transparent;
            width: 300px;
            height: 200px;
            perspective: 1000px;
            cursor: pointer;
        }

        /* Obiekt obracany */
        .flashcard-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 10px;
        }

        /* Efekt obrotu po kliknięciu/aktywacji klasy */
        .flashcard-wrapper.flipped .flashcard-inner {
            transform: rotateY(180deg);
        }

        /* Wspólne style dla przodu i tyłu */
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden; /* Wsparcie Safari */
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            border-radius: 10px;
        }

        /* Przód fiszki */
        .card-front {
            background-color: var(--card-front-bg);
            color: var(--text-front);
            border: 2px solid #bdc3c7;
        }

        .card-front h3 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 600;
        }

        .card-front .hint {
            font-size: 0.8rem;
            color: #7f8c8d;
            margin-top: 15px;
            text-transform: uppercase;
        }

        /* Tył fiszki */
        .card-back {
            background-color: var(--card-back-bg);
            color: var(--text-back);
            transform: rotateY(180deg);
            border: 2px solid var(--card-back-bg);
        }

        .card-back p {
            margin: 0;
            font-size: 1.6rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .card-back .label {
            font-size: 0.8rem;
            color: #bdc3c7;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <h1>Warsztat - Ważne Dane</h1>

    <div class="container">

        <!-- Fiszka 1: BDO -->
        <div class="flashcard-wrapper" onclick="toggleCard(this)">
            <div class="flashcard-inner">
                <div class="card-front">
                    <h3>Numer rejestrowy BDO</h3>
                    <div class="hint">Kliknij, aby odkryć</div>
                </div>
                <div class="card-back">
                    <div class="label">BDO:</div>
                    <p>000159648</p>
                </div>
            </div>
        </div>

        <!-- TUTAJ MOŻESZ DOPISYWAĆ KOLEJNE FISZKI, KOPIUJĄC PONIŻSZY SZABLON -->
        <!-- 
        <div class="flashcard-wrapper" onclick="toggleCard(this)">
            <div class="flashcard-inner">
                <div class="card-front">
                    <h3>NAZWA (np. NIP firmy)</h3>
                    <div class="hint">Kliknij, aby odkryć</div>
                </div>
                <div class="card-back">
                    <div class="label">ROZWINIĘCIE:</div>
                    <p>123-456-78-90</p>
                </div>
            </div>
        </div>
         -->

    </div>

    <script>
        // Funkcja odpowiadająca za obracanie fiszki po kliknięciu
        function toggleCard(card) {
            card.classList.toggle('flipped');
        }
    </script>

</body>
</html>
